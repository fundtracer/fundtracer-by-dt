<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FundTracer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">F</div>
        <span>FundTracer</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel" style="display: none;">
      <div class="settings-header">
        <span>Settings</span>
        <button class="close-settings" id="closeSettings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="settings-content">
        <div class="setting-group">
          <label>API Key</label>
          <div class="api-key-input">
            <input type="password" id="apiKeyInput" placeholder="Enter your API key">
            <button class="save-key-btn" id="saveKeyBtn">Save</button>
          </div>
          <p class="api-hint">Get free key at <a href="#" id="getApiLink">www.fundtracer.xyz</a></p>
        </div>
        <div class="setting-group">
          <label>Default Chain</label>
          <select id="defaultChain">
            <option value="ethereum">Ethereum</option>
            <option value="linea">Linea</option>
            <option value="arbitrum">Arbitrum</option>
            <option value="base">Base</option>
            <option value="optimism">Optimism</option>
            <option value="polygon">Polygon</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="main">
      <!-- Chain Tabs -->
      <div class="chain-tabs">
        <button class="chain-tab active" data-chain="ethereum">
          <span class="chain-icon eth"></span>
          Ethereum
        </button>
        <button class="chain-tab" data-chain="linea">
          <span class="chain-icon linea"></span>
          Linea
        </button>
        <button class="chain-tab" data-chain="arbitrum">
          <span class="chain-icon arb"></span>
          Arb
        </button>
        <button class="chain-tab" data-chain="base">
          <span class="chain-icon base"></span>
          Base
        </button>
        <button class="chain-tab" data-chain="optimism">
          <span class="chain-icon opt"></span>
          Opt
        </button>
        <button class="chain-tab" data-chain="polygon">
          <span class="chain-icon poly"></span>
          Poly
        </button>
      </div>

      <!-- Search -->
      <div class="search-section">
        <div class="search-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="addressInput" placeholder="0x..." autocomplete="off" spellcheck="false">
          <button class="clear-btn" id="clearBtn" style="display: none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <button class="analyze-btn" id="analyzeBtn">
          Analyze
        </button>
      </div>

      <!-- Loading -->
      <div class="loading-state" id="loadingState" style="display: none;">
        <div class="spinner"></div>
        <span>Analyzing...</span>
      </div>

      <!-- Error -->
      <div class="error-state" id="errorState" style="display: none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText">Error</span>
      </div>

      <!-- Results -->
      <div class="results" id="results" style="display: none;">
        <div class="result-header">
          <div class="result-title">Analysis Result</div>
          <button class="view-full-btn" id="viewFullBtn">Full Report →</button>
        </div>

        <div class="risk-card" id="riskCard">
          <div class="risk-label">Risk Level</div>
          <div class="risk-value" id="riskValue">-</div>
        </div>

        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">Sybil Score</div>
            <div class="stat-value" id="sybilScore">-</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Transactions</div>
            <div class="stat-value" id="txCount">-</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Balance</div>
            <div class="stat-value" id="balance">-</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">First Active</div>
            <div class="stat-value" id="firstTx">-</div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
          </svg>
        </div>
        <p>Enter a wallet address to analyze</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://www.fundtracer.xyz/app-evm" target="_blank">Open App</a>
      <span class="dot">•</span>
      <a href="https://www.fundtracer.xyz/pricing" target="_blank">Get API</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
